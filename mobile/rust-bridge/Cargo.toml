[package]
name = "botho-mobile"
version = "0.6.0"
edition = "2021"
description = "Mobile FFI bindings for Botho wallet"
license = "Apache-2.0"
rust-version = "1.75"

[lib]
# `rlib` is needed so native integration tests (and the gated live-testnet e2e)
# can link against the crate; `staticlib`/`cdylib` are the mobile FFI artifacts.
crate-type = ["staticlib", "cdylib", "rlib"]
name = "botho_mobile"

[dependencies]
# Core wallet functionality
botho-wallet = { path = "../../botho-wallet", default-features = false }
bth-account-keys = { path = "../../account-keys" }
bth-address-codec = { path = "../../address-codec" }
bth-crypto-keys = { path = "../../crypto/keys" }

# Node-identical CLSAG transaction build + sign + scan core. Reused so the
# bridge never reimplements ownership detection, key-image derivation, or ring
# signing -- the produced tx round-trips through the node's verifier. The crate
# exposes an `rlib` for native (non-wasm) consumers like this one.
bth-wasm-signer = { path = "../../web/packages/wasm-signer" }
bth-transaction-clsag = { path = "../../transaction/clsag" }

# Base58 address encoding (tbotho://1/<base58(view||spend)>)
bs58 = "0.4"

# UniFFI for generating Swift/Kotlin bindings
uniffi = { version = "0.28", features = ["cli"] }

# Async runtime (minimal for mobile)
tokio = { version = "1", features = ["rt", "sync"] }

# HTTP client for JSON-RPC against the configured node URL
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# RNG for ring decoy shuffling / CLSAG signing
rand = "0.8"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"

# Error handling
thiserror = "1"
anyhow = "1"

# Secure memory
zeroize = { version = "1", features = ["derive"] }

# BIP39 mnemonic generation
bip39 = { version = "2", features = ["rand"] }

[dev-dependencies]
# Full tokio for the gated live-testnet end-to-end test (multi-thread + macros).
tokio = { version = "1", features = ["full"] }
# Node-identical post-quantum key derivation, used only by the send-path
# acceptance test to derive the sender/recipient ML-KEM keypairs and run the
# hybrid ownership scan (`belongs_to_hybrid`) over mobile-built outputs (#978).
bth-crypto-pq = { path = "../../crypto/pq" }

[build-dependencies]
uniffi = { version = "0.28", features = ["build"] }

[features]
default = []
# Enable for iOS builds
ios = []
# Enable for Android builds
android = []
