# Cloudflare Worker — Botho-as-a-Service control plane (#458 §1).
#
# Deploy with:
#   pnpm --filter @botho/baas-worker deploy
# Requires CLOUDFLARE_API_TOKEN with "Workers Scripts: Edit".
#
# SECRETS (never in the repo — set with `wrangler secret put`):
#   STRIPE_SECRET_KEY   Stripe secret key. Use a TEST key (sk_test_...) while on
#                       testnet (#458 §7). LIVE key only when the maintainer
#                       flips to live billing.
#   STRIPE_PRICE_ID     The recurring $50/mo Price id ("price_..."). Created once
#                       in the Stripe dashboard (see README). Kept as a secret so
#                       no live id is committed.
#   --- provisioner (#502, #458 §3/§5) — a DEDICATED, tightly-scoped IAM user ---
#   AWS_ACCESS_KEY_ID       provisioner IAM user access key.
#   AWS_SECRET_ACCESS_KEY   provisioner IAM user secret key.
#   AWS_SESSION_TOKEN       (optional) STS session token if using temp creds.
#   CF_DNS_API_TOKEN        Cloudflare Zone:DNS:Edit token for rig DNS records.
#   CF_DNS_ZONE_ID          Cloudflare zone id for testnet.botho.io.
#   BOTHO_BINARY_URL        (optional) URL of the linux-aarch64 botho binary the
#                           rig downloads at boot (release asset / R2 mirror).
#   BOTHO_BINARY_SHA256     (optional) sha256 to pin that binary.
#
# VARS below are non-secret and safe to commit (public URLs, ids, an origin
# allowlist). Override per-environment as needed.

name = "botho-baas"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# D1 — the user<->rig mapping (#458 §3 step 4). Apply schema.sql before first
# use. The `database_id` below is a PLACEHOLDER: replace it with the real id from
# `wrangler d1 create botho-baas` (the id is an account-scoped uuid, not a
# secret, but is environment-specific so it is left blank here).
[[d1_databases]]
binding = "DB"
database_name = "botho-baas"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
# Where Stripe redirects after a successful / cancelled checkout. These point at
# the Pages site that hosts the "Get a rig" surface.
CHECKOUT_SUCCESS_URL = "https://botho.io/rig/success"
CHECKOUT_CANCEL_URL = "https://botho.io/rig"
# Browser origins permitted to call /checkout (comma-separated).
ALLOWED_ORIGINS = "https://botho.io,https://wallet.botho.io"

# --- provisioner non-secret config (#502) ---------------------------------
# Compute shape (proven seed/faucet rig). Non-secret identifiers.
RIG_AMI_ID = "ami-012798e88aebdba5c"
RIG_SECURITY_GROUP_ID = "sg-0dd3fc95ec3916a4a"
RIG_KEY_NAME = "botho-nodes"
# Zone under which rig-<id> hostnames live.
RIG_DOMAIN = "testnet.botho.io"
# Global fleet-cap circuit breaker (#458 §5). Conservative default for testnet.
FLEET_CAP = "25"
# Where the instance fetches the bootstrap script at first boot (#499/#521).
BOOTSTRAP_SCRIPT_URL = "https://raw.githubusercontent.com/botho-project/botho/main/infra/baas/rig-bootstrap.sh"
