[package]
name = "bth-bridge-core"
version = "0.6.0"
authors = ["Botho"]
edition = "2021"
description = "Core types and logic for BTH bridge"
license = "Apache-2.0"
rust-version = { workspace = true }

[features]
default = ["std"]
std = []

[dependencies]
serde = { workspace = true, features = ["derive", "alloc"] }
chrono = { workspace = true, features = ["serde", "std", "clock"] }
# Structural BTH address validation (#1042): base58-decode the address body so
# junk destinations are rejected at order-create. Tiny, already in the
# workspace lockfile (the bridge service uses it for recipient decoding).
bs58 = { workspace = true }
uuid = { version = "1", features = ["v4", "serde"] }
toml = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true, features = ["std"] }

# Attestation envelope protocol (#824): federation Ed25519 signatures and
# canonical-JSON envelope parsing, mirroring the operator-signed-action
# machinery.
ed25519-dalek = { workspace = true, features = ["std"] }
serde_json = { workspace = true, features = ["std"] }

# The deterministic bridge-election tally CLI (ADR 0010 option C / A1). A thin,
# dependency-free wrapper over the pure `election` module.
[[bin]]
name = "bridge-tally"
path = "src/bin/bridge-tally.rs"

[dev-dependencies]
tempfile = { workspace = true }
