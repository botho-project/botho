[package]
name = "bth-bridge-service"
version = "0.3.2"
authors = ["Botho"]
edition = "2021"
description = "BTH bridge service for Ethereum and Solana"
license = "Apache-2.0"
rust-version = { workspace = true }

[[bin]]
name = "bth-bridge"
path = "src/main.rs"

[dependencies]
# Internal crates
bth-bridge-core = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }

# Ethereum (wBTH mint submission per ADR 0002: Gnosis Safe execTransaction)
alloy = { workspace = true, features = [
    "consensus",
    "contract",
    "eips",
    "network",
    "provider-http",
    "reqwest",
    "reqwest-rustls-tls",
    "rpc-types",
    "signer-local",
    "sol-types",
] }

# k256 reaches this crate through alloy; this edge exists ONLY to co-activate
# `precomputed-tables` (+ its `std` gate) on the shared k256 build unit. The
# workspace `.cargo/config.toml` injects `--cfg=feature="precomputed-tables"`
# into every x86_64 build (a curve25519-dalek hack, see #361 and
# crypto/secp256k1/Cargo.toml): without the REAL feature enabled, that injected
# cfg makes k256 reference `once_cell` without linking it, so any
# package-scoped build (`cargo test -p bth-bridge-service`, bridge-ci.yml)
# fails to compile k256 on x86_64.
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "std", "precomputed-tables"] }

# BTH release attestation verification (ADR 0002: federation Ed25519
# signatures, mirroring the operator-signed-action machinery)
ed25519-dalek = { workspace = true, features = ["std"] }

# Live BTH node transports (#856): deposit view-key scan + release tx
# construction / CLSAG signing. We REUSE the node-identical crypto and wire
# format rather than reimplement any of it:
#   - bth-transaction-clsag: the exact Transaction/TxOutput/CLSAG types and the
#     bincode wire format the node deserializes in `tx_submit`, plus MemoPayload
#     and stealth `belongs_to` / `recover_spend_key` used to scan deposits and
#     recover one-time spend keys for release inputs.
#   - bth-account-keys / bth-crypto-keys: AccountKey + Ristretto keys (reserve
#     view/spend keys, recipient address).
#   - bth-crypto-ring-signature: node-identical key-image derivation for the
#     provably-dead (dropped) release check.
bth-transaction-clsag = { path = "../../transaction/clsag", default-features = false }
bth-account-keys = { workspace = true }
bth-crypto-keys = { workspace = true }
bth-crypto-ring-signature = { workspace = true }

# JSON-RPC over HTTP to the BTH node (getChainInfo / getBlockByHeight /
# chain_getOutputs / tx_submit / getTransaction / chain_areKeyImagesSpent).
# rustls-tls matches the alloy TLS backend so only one TLS stack links.
reqwest = { workspace = true, features = ["json", "rustls-tls"] }

# Deterministic-RNG signing in tests; OsRng in production.
rand_core = { workspace = true, features = ["getrandom"] }

# Recipient BTH address decoding (base58 view||spend, matching the node's
# classical address layout).
bs58 = { workspace = true }

# The exact bincode wire format the node's `tx_submit` deserializes.
bincode = { workspace = true }

# Proof-of-reserves HTTP API (#825; same axum line as the metrics-daemon)
axum = { version = "0.7", features = ["json"] }

# Solana wBTH transport (#857): a lightweight raw JSON-RPC client
# (reqwest) plus a self-contained legacy-message/transaction assembler.
# We deliberately do NOT pull the heavy solana-sdk / solana-client stack:
# the crypto we need is Ed25519 (already available via ed25519-dalek) and
# base58 (bs58), and the legacy transaction wire format is small and stable.
# reqwest and bs58 are already in the workspace lockfile (reqwest via alloy),
# so this adds no new advisory surface.

# Database
rusqlite = { version = "0.31", features = ["bundled"] }

# Utilities
chrono = { workspace = true, features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
hex = { workspace = true, features = ["std"] }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true, features = ["std"] }
sha2 = { workspace = true, features = ["std"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { workspace = true, features = ["derive"] }

[dev-dependencies]
proptest = { workspace = true, features = ["default-code-coverage"] }
tempfile = { workspace = true }
# Deterministic RNG for reproducible tx-construction test vectors (#856).
rand = { workspace = true, features = ["std_rng"] }
# Test-only stealth outputs paid to the reserve (deposit-scan + release
# input construction unit tests) reuse the node-identical output builder.
bth-transaction-types = { workspace = true }
