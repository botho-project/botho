# cargo-deny configuration
# Run with: cargo deny check
# Documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
# Only analyze these targets
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = false

[advisories]
# The database of security advisories
db-path = "~/.cargo/advisory-db"
# Ignore specific advisories (transitive deps we can't easily update)
ignore = [
    # GTK3/GTK4 bindings from Tauri - transitive dependencies
    "RUSTSEC-2024-0370",  # proc-macro-error (unmaintained)
    "RUSTSEC-2024-0411",  # gtk3 unmaintained (system-deps)
    "RUSTSEC-2024-0412",  # gtk3 unmaintained (gdkx11)
    "RUSTSEC-2024-0413",  # gdk
    "RUSTSEC-2024-0414",  # gdkwayland
    "RUSTSEC-2024-0415",  # webkit2gtk
    "RUSTSEC-2024-0416",  # gtk
    "RUSTSEC-2024-0417",  # gdk-pixbuf
    "RUSTSEC-2024-0418",  # atk
    "RUSTSEC-2024-0419",  # cairo-rs
    "RUSTSEC-2024-0420",  # gio
    "RUSTSEC-2024-0429",  # glib unsoundness
    "RUSTSEC-2024-0436",  # paste unmaintained
    # fxhash - unmaintained, transitive from wry/tauri
    "RUSTSEC-2025-0057",
    # unic-* - unmaintained, transitive from tauri
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    # rustls-pemfile unmaintained - using v2 via reqwest 0.12
    "RUSTSEC-2025-0098",
    # num-bigint-dig reciprocal_mg10 unsoundness
    "RUSTSEC-2025-0100",
    # number_prefix - unmaintained, transitive from indicatif
    "RUSTSEC-2025-0119",

    # --- Cycle-7 audit (issue #658) --------------------------------------
    # Advisories firing against the live RustSec DB as of 2026-07-05 that have
    # no in-semver fix available or whose fix is deferred. Each is justified
    # below. The hickory/libp2p upgrade path is tracked in follow-up issue #659
    # (Slice B); the DNS advisories are node-reachable and monitored there.

    # hickory-proto 0.25.2 - node-reachable DNS resolver (libp2p-dns / mdns).
    # Fix requires hickory >=0.26.1, blocked on the libp2p 0.56 -> 0.57 upgrade.
    "RUSTSEC-2026-0119",  # hickory-proto O(n^2) CPU exhaustion on name compression (#659)
    "RUSTSEC-2026-0118",  # hickory-proto NSEC3 unbounded loop - no fixed version exists; monitor (#659)

    # quick-xml 0.38.4 - desktop-wallet only (tauri/plist), not node-reachable.
    "RUSTSEC-2026-0194",  # quick-xml quadratic duplicate-attribute check (desktop-only)
    "RUSTSEC-2026-0195",  # quick-xml unbounded namespace-declaration allocation (desktop-only)

    # core2 0.4.0 - yanked/unmaintained, libp2p -> multihash transitive.
    # No fix until the libp2p upgrade (#659). Warning-level.
    "RUSTSEC-2026-0105",  # core2 unmaintained/yanked (libp2p transitive, #659)

    # rustls-webpki 0.102.8 - fires only against the OLD 0.102 line pulled in
    # via rustls 0.22.4 -> sentry 0.34.0 -> bth-common. The workspace's primary
    # rustls-webpki 0.103.13 is NOT affected. Fixes land in the 0.103.x line
    # (rustls 0.23); the 0.102 line has no patched release, so clearing these
    # requires a sentry / rustls-0.23 bump, not a webpki bump. Tracked for a
    # sentry-upgrade follow-up.
    "RUSTSEC-2026-0104",  # rustls-webpki reachable panic in CRL parsing (0.102.8 via sentry; sentry/rustls-0.23 bump tracked in #661)
    "RUSTSEC-2026-0049",  # rustls-webpki CRL distribution-point authority mismatch (0.102.8 via sentry; sentry/rustls-0.23 bump tracked in #661)
    "RUSTSEC-2026-0098",  # rustls-webpki URI name-constraint bypass (0.102.8 via sentry; sentry/rustls-0.23 bump tracked in #661)
    "RUSTSEC-2026-0099",  # rustls-webpki wildcard name-constraint bypass (0.102.8 via sentry; sentry/rustls-0.23 bump tracked in #661)

    # bincode 1.3.3 - unmaintained; no safe upgrade (2.x is a different API).
    "RUSTSEC-2025-0141",  # bincode unmaintained (no safe upgrade)

    # rustls-pemfile 2.2.0 - unmaintained; no safe upgrade. Transitive via the
    # reqwest / rustls TLS stack.
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained (no safe upgrade)
]

[licenses]
# Allow common permissive and copyleft licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    # GPL licenses
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    # For webpki-roots
    "CDLA-Permissive-2.0",
]
# Allow workspace crates without explicit licenses
private = { ignore = true }
confidence-threshold = 0.8
# Exceptions for deprecated GPL-3.0 identifier (our workspace crates)
exceptions = [
    { crate = "botho", allow = ["GPL-3.0"] },
    { crate = "bth-consensus-scp", allow = ["GPL-3.0"] },
    { crate = "bth-consensus-scp-play", allow = ["GPL-3.0"] },
    { crate = "bth-consensus-scp-types", allow = ["GPL-3.0"] },
    { crate = "bth-transaction-clsag", allow = ["GPL-3.0"] },
    { crate = "bth-util-logger-macros", allow = ["GPL-3.0"] },
    { crate = "bth-util-test-helper", allow = ["GPL-3.0"] },
    { crate = "bth-wasm-signer", allow = ["GPL-3.0"] },
]

[[licenses.clarify]]
# ring uses a custom license that is ISC-compatible
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
crate = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
# Deny multiple versions of the same crate (with exceptions)
multiple-versions = "warn"
# Deny crates we want to avoid
deny = [
    # Vulnerable versions of ring (0.16.x)
    { crate = "ring@=0.16", wrappers = [] },
]
# Allow specific crates that may have duplicates
skip = [
    # Common crates that often have multiple versions
    { crate = "hashbrown@0.13", reason = "Different deps use different hashbrown versions" },
    { crate = "hashbrown@0.14", reason = "Different deps use different hashbrown versions" },
    { crate = "base64@0.21", reason = "Newer base64 version" },
    { crate = "webpki-roots@0.26", reason = "TLS dependencies" },
    { crate = "itertools@0.12", reason = "Different deps use different versions" },
    { crate = "itertools@0.13", reason = "Different deps use different versions" },
]
# Skip when these crates are transitive deps
skip-tree = [
    # bulletproofs-og is a patched crate with specific dep versions
    { crate = "bulletproofs-og", reason = "Patched fork with pinned deps" },
    { crate = "schnorrkel-og", reason = "Patched fork with pinned deps" },
]

[sources]
# Only allow crates from crates.io and specific git repos
unknown-registry = "deny"
unknown-git = "warn"
allow-git = [
    "https://github.com/mobilecoinfoundation/bulletproofs.git",
    "https://github.com/mobilecoinfoundation/schnorrkel.git",
]
