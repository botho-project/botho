name: Bridge E2E

# Gated (nightly + manual) bridge end-to-end jobs (#828). These are NOT
# run per-PR: the Ethereum-leg job needs a local chain node and full
# contract deployment (minutes, not seconds), and the testnet round trip
# needs live infrastructure and funded keys.

on:
  workflow_dispatch:
  schedule:
    # Nightly at 03:30 UTC (offset from the 02:00 fuzz run).
    - cron: '30 3 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Hermetic end-to-end of the Ethereum leg through the REAL Rust pipeline
  # (bridge/service/src/fork_tests.rs): deploys WrappedBTH + the SafeStub
  # threshold multisig to a local Hardhat node, then runs federation
  # attestation -> Safe-wrapped bridgeMint -> confirmation polling ->
  # idempotent re-broadcast -> bridgeBurn -> watcher burn scan, asserting
  # exact factor-1 picocredit amounts (ADR 0003) and the supply invariant.
  ethereum-leg:
    name: Ethereum leg (local node, full Rust pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/ethereum/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: bridge-e2e

      - name: Run Ethereum-leg e2e
        run: ./scripts/bridge-e2e-local.sh

  # Same Ethereum-leg pipeline as `ethereum-leg`, but against a node forking
  # REAL Sepolia state over a public RPC (chain id 11155111) — the closest-to-
  # real-testnet demo achievable with NO funded account, deployed contract, or
  # secret (#992). The dev accounts are funded on the fork via *_setBalance and
  # a throwaway WrappedBTH + SafeStub is freshly deployed onto the forked state.
  #
  # workflow_dispatch ONLY: a public-RPC fork in nightly CI risks rate-limit
  # flakiness (maintainer decision — promote to nightly only once a stable
  # archive RPC is provisioned). Skips cleanly when SEPOLIA_RPC_URL is absent.
  ethereum-leg-sepolia-fork:
    name: Ethereum leg (Sepolia fork, no secrets/funds)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Check for SEPOLIA_RPC_URL
        id: rpc
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: |
          if [[ -z "$SEPOLIA_RPC_URL" ]]; then
            echo "::notice::SEPOLIA_RPC_URL secret is not set — skipping the"
            echo "::notice::Sepolia-fork e2e. Provision a public/Alchemy/Infura"
            echo "::notice::Sepolia RPC as the SEPOLIA_RPC_URL repo secret to run it."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.rpc.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/ethereum/package-lock.json

      - name: Install Rust
        if: steps.rpc.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03

      - name: Install Foundry (anvil)
        if: steps.rpc.outputs.present == 'true'
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache cargo
        if: steps.rpc.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: bridge-e2e

      - name: Run Sepolia-fork e2e
        if: steps.rpc.outputs.present == 'true'
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: ./scripts/bridge-e2e-fork.sh

  # The live-testnet BTH -> wBTH -> burn -> BTH round trip is a MANUAL
  # drill for now: the BTH release / deposit-scan live transports are
  # pending (#856), so the full loop cannot run unattended. The procedure,
  # its assertions (exact amounts per ADR 0003, stealth re-shield per
  # ADR 0004, terminal order states, proof-of-reserves), and the
  # automation criteria for this job live in
  # docs/bridge/testnet-e2e-runbook.md.
  testnet-round-trip:
    name: Testnet round trip (manual runbook pointer)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Point at the runbook
        run: |
          echo "::notice::The live testnet round trip is a manual drill until the"
          echo "::notice::BTH live transports land (#856; Solana: #857, federation"
          echo "::notice::transport: #858). Follow docs/bridge/testnet-e2e-runbook.md"
          echo "::notice::and record the drill results on the tracking issue (#816)."
