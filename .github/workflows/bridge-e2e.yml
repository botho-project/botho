name: Bridge E2E

# Gated (nightly + manual) bridge end-to-end jobs (#828). These are NOT
# run per-PR: the Ethereum-leg job needs a local chain node and full
# contract deployment (minutes, not seconds), and the testnet round trip
# needs live infrastructure and funded keys.

on:
  workflow_dispatch:
  schedule:
    # Nightly at 03:30 UTC (offset from the 02:00 fuzz run).
    - cron: '30 3 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Hermetic end-to-end of the Ethereum leg through the REAL Rust pipeline
  # (bridge/service/src/fork_tests.rs): deploys WrappedBTH + the SafeStub
  # threshold multisig to a local Hardhat node, then runs federation
  # attestation -> Safe-wrapped bridgeMint -> confirmation polling ->
  # idempotent re-broadcast -> bridgeBurn -> watcher burn scan, asserting
  # exact factor-1 picocredit amounts (ADR 0003) and the supply invariant.
  ethereum-leg:
    name: Ethereum leg (local node, full Rust pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/ethereum/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: bridge-e2e

      - name: Run Ethereum-leg e2e
        run: ./scripts/bridge-e2e-local.sh

  # The orchestrated FULL LOOP (#993): wrap -> mint-wBTH -> burn ->
  # release-BTH driven through the REAL bridge engine
  # (OrderProcessor::process_pending_orders) with BOTH chains live — a local
  # Botho node (botho-testnet) AND a local Hardhat node — and ZERO external
  # creds. It boots both nodes and runs the #[ignore]d full-loop test
  # (bridge/service/src/e2e_full_loop_tests.rs), enforcing the four
  # properties as hard failures: peg intake (wBTH minted == BTH locked),
  # correct release to a fresh stealth output (ADR 0004), the
  # proof-of-reserves invariant across the loop (ADR 0003), and federation
  # authorization (t-of-n EIP-712 mint + t-of-n Ed25519 release; a single
  # signer never moves value). The driver PROVISIONS the reserve/user wallet
  # key material at runtime (#999) via `botho-testnet gen-bridge-keys` — the
  # reserve is the node's own pre-funded (factor-1-accruing) mining wallet and
  # NO secret is committed. The BTH leg runs the moment the harness can boot a
  # healthy single-node 6.0.0 testnet (the #998/#1000 wedge prerequisite); see
  # scripts/bridge-e2e-full-loop.sh and docs/bridge/testnet-e2e-runbook.md.
  full-loop:
    name: Full loop (local Botho + hardhat, real engine)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/ethereum/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: bridge-e2e-full-loop

      - name: Run full-loop e2e
        run: ./scripts/bridge-e2e-full-loop.sh

  # Same Ethereum-leg pipeline as `ethereum-leg`, but against a node forking
  # REAL Sepolia state over a public RPC (chain id 11155111) — the closest-to-
  # real-testnet demo achievable with NO funded account, deployed contract, or
  # secret (#992). The dev accounts are funded on the fork via *_setBalance and
  # a throwaway WrappedBTH + SafeStub is freshly deployed onto the forked state.
  #
  # workflow_dispatch ONLY: a public-RPC fork in nightly CI risks rate-limit
  # flakiness (maintainer decision — promote to nightly only once a stable
  # archive RPC is provisioned). Skips cleanly when SEPOLIA_RPC_URL is absent.
  ethereum-leg-sepolia-fork:
    name: Ethereum leg (Sepolia fork, no secrets/funds)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Check for SEPOLIA_RPC_URL
        id: rpc
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: |
          if [[ -z "$SEPOLIA_RPC_URL" ]]; then
            echo "::notice::SEPOLIA_RPC_URL secret is not set — skipping the"
            echo "::notice::Sepolia-fork e2e. Provision a public/Alchemy/Infura"
            echo "::notice::Sepolia RPC as the SEPOLIA_RPC_URL repo secret to run it."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.rpc.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/ethereum/package-lock.json

      - name: Install Rust
        if: steps.rpc.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03

      - name: Install Foundry (anvil)
        if: steps.rpc.outputs.present == 'true'
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache cargo
        if: steps.rpc.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: bridge-e2e

      - name: Run Sepolia-fork e2e
        if: steps.rpc.outputs.present == 'true'
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: ./scripts/bridge-e2e-fork.sh

  # The full wBTH DeFi ROUND TRIP (#1005) — the mainnet liquidity-launch
  # rehearsal. Joins the full-loop wrap/repatriate legs (real engine) with the
  # Uniswap-v3 fork harness into ONE continuous journey of a coin, driven end to
  # end against a node forking REAL Sepolia state (chain id 11155111) plus a
  # local Botho node:
  #   mint BTH -> wrap->wBTH (t-of-n EIP-712 Safe bridgeMint) -> fund gas +
  #   WETH -> seed the wBTH/WETH Uniswap v3 pool + add liquidity -> swap
  #   WETH->wBTH (the market buys) -> bridgeBurn the swap proceeds -> t-of-n
  #   Ed25519 release to a fresh stealth output the user scans back.
  # It asserts the peg on wrap (ADR 0003), pool + swap moved balances, the burn
  # amount == the swap output and the released BTH == that amount to a fresh
  # ADR-0004 output, and proof-of-reserves drift == 0 across the whole loop.
  #
  # workflow_dispatch ONLY and skips cleanly when SEPOLIA_RPC_URL is absent —
  # the Uniswap periphery only exists on a Sepolia fork, and a public-RPC fork
  # in nightly CI risks rate-limit flakiness (same discipline as
  # ethereum-leg-sepolia-fork). The BTH leg self-skips (green) until the reserve
  # wallet key material is provisioned (#999), same as the full-loop job. The
  # live-Sepolia variant flips by swapping RPC + a funded key (#866/#869) — see
  # scripts/bridge-e2e-defi-fork.sh and docs/bridge/testnet-e2e-runbook.md.
  defi-round-trip:
    name: DeFi round trip (Sepolia fork + local Botho, real engine + Uniswap)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Check for SEPOLIA_RPC_URL
        id: rpc
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: |
          if [[ -z "$SEPOLIA_RPC_URL" ]]; then
            echo "::notice::SEPOLIA_RPC_URL secret is not set — skipping the DeFi"
            echo "::notice::round-trip e2e (the Uniswap v3 periphery only exists on a"
            echo "::notice::Sepolia fork). Provision a public/Alchemy/Infura Sepolia"
            echo "::notice::RPC as the SEPOLIA_RPC_URL repo secret to run it."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.rpc.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/ethereum/package-lock.json

      - name: Install Rust
        if: steps.rpc.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03

      - name: Install Foundry (anvil)
        if: steps.rpc.outputs.present == 'true'
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache cargo
        if: steps.rpc.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: bridge-e2e-defi-round-trip

      - name: Run DeFi round-trip e2e
        if: steps.rpc.outputs.present == 'true'
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: ./scripts/bridge-e2e-defi-fork.sh

  # The Solana DeFi round trip (#1079) is construction-validated: Orca
  # Whirlpools cannot be forked/cloned hermetically, so the pool/swap legs run
  # against LIVE devnet (operator step, #1052/#868) and cannot run in CI. What
  # CI CAN gate on every push is the driver's wiring + shell hygiene via the
  # hermetic --check self-check (touches no cluster). The bridge-transport
  # drills themselves self-skip (green) when unconfigured, exactly like the
  # Ethereum legs — see scripts/bridge-e2e-defi-solana.sh and the
  # "Layer 0.75-Solana" section of docs/bridge/testnet-e2e-runbook.md.
  defi-round-trip-solana:
    name: Solana DeFi round trip (construction-validated self-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck the Solana DeFi driver
        run: shellcheck scripts/bridge-e2e-defi-solana.sh

      - name: Hermetic self-check (no cluster)
        run: ./scripts/bridge-e2e-defi-solana.sh --check

  # The live-testnet BTH -> wBTH -> burn -> BTH round trip is a MANUAL
  # drill for now: it needs funded Gnosis Safes + Sepolia ETH (#866/#868),
  # and the BTH live transports (#856). The local variant of this same loop
  # runs unattended in the `full-loop` job above. The procedure, its
  # assertions (exact amounts per ADR 0003, stealth re-shield per ADR 0004,
  # terminal order states, proof-of-reserves), and the automation criteria
  # for this job live in
  # docs/bridge/testnet-e2e-runbook.md.
  testnet-round-trip:
    name: Testnet round trip (manual runbook pointer)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Point at the runbook
        run: |
          echo "::notice::The LOCAL full loop is automated (see the full-loop job)."
          echo "::notice::The live-Sepolia round trip is a manual drill until funded"
          echo "::notice::Safes + Sepolia ETH land (#866/#868). Follow"
          echo "::notice::docs/bridge/testnet-e2e-runbook.md and record results on #816."
