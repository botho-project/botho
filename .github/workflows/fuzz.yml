name: Fuzz Testing

on:
  # Build-only guard on PRs that touch the (workspace-excluded) fuzz crate or the
  # crates it fuzzes. This is what prevents the fuzz suite from silently bit-rotting:
  # it never builds in a normal `cargo` run because `fuzz/` is excluded from the
  # workspace, so without this guard API drift goes unnoticed until someone runs it.
  pull_request:
    paths:
      - 'fuzz/**'
      - 'botho/**'
      - 'crypto/**'
      - 'account-keys/**'
      - 'transaction/**'
      - 'util/**'
      - 'bridge/**'
      - 'rust-toolchain'
      - '.github/workflows/fuzz.yml'
  schedule:
    # Run nightly at 2am UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: 'Fuzz time per target (seconds)'
        required: false
        default: '600'
      targets:
        description: 'Specific targets to fuzz (comma-separated, empty for all)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  # Default fuzz time: 10 minutes per target for nightly, configurable for manual runs
  FUZZ_TIME: ${{ github.event.inputs.fuzz_time || '600' }}

jobs:
  # Fast, PR-triggered build-only guard. Compiles every fuzz target against the
  # current API using the repo's PINNED toolchain (read from rust-toolchain) so it
  # matches the compiler the rest of the workspace uses. We intentionally do NOT
  # use a rolling `@nightly`: hashbrown 0.14.5 (pulled in transitively) fails to
  # compile on newer nightlies, and the pinned channel is the contract the repo
  # already builds against. This job does not run the fuzzer; it only `fuzz build`s.
  fuzz-build:
    name: Fuzz Build Guard (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml at the repo root pins the channel; rustup honors it
      # automatically for cargo invocations run from the repo. Install matching
      # components for libfuzzer/sanitizer coverage builds.
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03
          components: rust-src,llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Build all fuzz targets (no run)
        working-directory: fuzz
        # No `+nightly`: the rust-toolchain file selects the pinned channel.
        run: cargo fuzz build

  fuzz-crypto:
    name: Fuzz Crypto Primitives
    # Long-running fuzz jobs only run on schedule/manual dispatch, never on PRs
    # (PRs get the fast fuzz-build guard above instead).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max

    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_clsag
          - fuzz_subaddress
          - fuzz_ring_signature

    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03
          components: rust-src,llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzz target
        working-directory: fuzz
        run: |
          echo "Fuzzing ${{ matrix.target }} for $FUZZ_TIME seconds..."
          # No `+nightly`: rust-toolchain pins the channel used for the whole repo.
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=$FUZZ_TIME

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

  fuzz-network:
    name: Fuzz Network/Transaction
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours max

    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_transaction
          - fuzz_pq_transaction
          - fuzz_block
          - fuzz_network_messages

    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03
          components: rust-src,llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzz target
        working-directory: fuzz
        run: |
          echo "Fuzzing ${{ matrix.target }} for $FUZZ_TIME seconds..."
          # No `+nightly`: rust-toolchain pins the channel used for the whole repo.
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=$FUZZ_TIME

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

  fuzz-parsing:
    name: Fuzz Parsing
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 1 hour max

    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_address_parsing
          - fuzz_rpc_request
          - fuzz_pq_keys
          - fuzz_mlkem_decapsulation

    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03
          components: rust-src,llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzz target
        working-directory: fuzz
        run: |
          echo "Fuzzing ${{ matrix.target }} for $FUZZ_TIME seconds..."
          # No `+nightly`: rust-toolchain pins the channel used for the whole repo.
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=$FUZZ_TIME

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

  fuzz-consensus:
    name: Fuzz Consensus/Economics
    # Consensus-critical acceptance + monetary-math targets (issue #337).
    # A crash here is a finding, not a nuisance: minimize and file a bug.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours max

    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_add_block
          - fuzz_multi_input_balance
          - fuzz_lottery_validation
          - fuzz_cluster_tax_math

    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03
          components: rust-src,llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzz target
        working-directory: fuzz
        run: |
          echo "Fuzzing ${{ matrix.target }} for $FUZZ_TIME seconds..."
          # No `+nightly`: rust-toolchain pins the channel used for the whole repo.
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=$FUZZ_TIME

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

  fuzz-bridge:
    name: Fuzz Bridge Federation
    # Custody-relevant bridge federation targets (issue #892). The attestation
    # set is the t-of-n threshold chokepoint that ingests adversarial per-signer
    # attestations; a crash or a violated invariant here is a finding, not a
    # nuisance — minimize and file a bug.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 1 hour max

    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_bridge_attestation
          - fuzz_bridge_solana_parse
          - fuzz_federation_status_line

    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-03
          components: rust-src,llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzz target
        working-directory: fuzz
        run: |
          echo "Fuzzing ${{ matrix.target }} for $FUZZ_TIME seconds..."
          # No `+nightly`: rust-toolchain pins the channel used for the whole repo.
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=$FUZZ_TIME

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

  fuzz-summary:
    name: Fuzz Summary
    runs-on: ubuntu-latest
    needs: [fuzz-crypto, fuzz-network, fuzz-parsing, fuzz-consensus, fuzz-bridge]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.fuzz-crypto.result }}" == "failure" ] || \
             [ "${{ needs.fuzz-network.result }}" == "failure" ] || \
             [ "${{ needs.fuzz-parsing.result }}" == "failure" ] || \
             [ "${{ needs.fuzz-consensus.result }}" == "failure" ] || \
             [ "${{ needs.fuzz-bridge.result }}" == "failure" ]; then
            echo "::error::One or more fuzz targets found crashes!"
            exit 1
          fi
          echo "All fuzz targets passed without crashes."
