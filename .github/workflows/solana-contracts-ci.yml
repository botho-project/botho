name: Solana Contracts CI

# Builds and tests the wBTH Anchor program (contracts/solana) on every PR that
# can affect the Solana side or the Rust minter whose instruction-data /
# account-meta / seed / Bridge-layout assumptions the ts-mocha suite pins
# (#883, orphaned by the #872 partial close). The hardened mint-authority
# program (#850) previously had NO CI proving it even compiles as an SBF
# program, and tests/wbth.ts (#850) was never executed anywhere — this runs
# `anchor build` then `anchor test` so drift fails CI instead of surfacing as a
# stuck mint on devnet/mainnet.
#
# Kept SEPARATE from the Ethereum contracts-ci.yml so this slow/heavy job
# (full Solana + Anchor toolchain install + SBF compile + solana-test-validator
# spin-up) never gates Ethereum/bridge PRs.

on:
  pull_request:
    paths:
      - 'contracts/solana/**'
      # The Rust minter whose (discriminator, account-meta order, seeds,
      # Bridge mint offset) assumptions the ts-mocha suite validates against a
      # built program: changes here should re-run the Anchor suite.
      - 'bridge/service/src/mint/solana.rs'
      - '.github/workflows/solana-contracts-ci.yml'
  workflow_dispatch:

# Toolchain pins are load-bearing, not cosmetic: a floating Solana/Anchor
# install silently regenerates an IDL incompatible with the pinned 0.29 crates.
env:
  SOLANA_VERSION: '1.18.26'
  ANCHOR_VERSION: '0.29.0'

jobs:
  anchor:
    name: anchor build + test
    runs-on: ubuntu-latest
    # SBF build + validator spin-up + cold toolchain install is slow; give it
    # generous headroom. Warm-cache runs are materially faster.
    timeout-minutes: 60
    defaults:
      run:
        working-directory: contracts/solana
    steps:
      - uses: actions/checkout@v4

      # Rust toolchain the Anchor / SBF build shells out to.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache cargo registry/git + the workspace target so warm re-runs skip
      # recompiling the crate graph. Keyed on the program manifests.
      - name: Cache cargo + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/solana/target
          key: solana-cargo-${{ runner.os }}-${{ env.SOLANA_VERSION }}-${{ env.ANCHOR_VERSION }}-${{ hashFiles('contracts/solana/Cargo.toml', 'contracts/solana/programs/wbth/Cargo.toml') }}
          restore-keys: |
            solana-cargo-${{ runner.os }}-${{ env.SOLANA_VERSION }}-${{ env.ANCHOR_VERSION }}-

      # Cache the installed Solana toolchain + avm/Anchor binaries; the cold
      # install of both is the slow path.
      - name: Cache Solana + Anchor toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana
            ~/.avm
          key: solana-toolchain-${{ runner.os }}-${{ env.SOLANA_VERSION }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install Solana CLI (pinned)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana CLI
        run: solana --version

      - name: Install Anchor CLI (pinned via avm)
        run: |
          if ! command -v avm >/dev/null 2>&1; then
            cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          fi
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"

      - name: Verify Anchor CLI
        run: anchor --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # No JS lockfile is committed under contracts/solana/, so `npm ci` (which
      # requires one) cannot be used here; `npm install` tolerates its absence.
      # If a package-lock.json is committed later, switch to `npm ci` + npm
      # cache for parity with contracts-ci.yml (#861).
      - name: Install JS dependencies
        run: npm install

      # `anchor test` uses ~/.config/solana/id.json as the provider wallet
      # (Anchor.toml [provider].wallet) and funds it from the spawned validator.
      - name: Generate a local provider keypair
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase --force -o "$HOME/.config/solana/id.json"

      # Compiles the SBF program AND generates target/types/wbth.ts (the type
      # tests/wbth.ts imports). Must run before `anchor test`.
      - name: anchor build
        run: anchor build

      # Spawns solana-test-validator and runs the ts-mocha suite (via the
      # npm-consistent `npx ts-mocha` [scripts] test line in Anchor.toml). The
      # suite's successful bridge_mint proves the account-meta order the Rust
      # minter (bridge/service/src/mint/solana.rs) builds is accepted by the
      # built program.
      - name: anchor test
        run: anchor test
