[features]
seeds = false
skip-lint = false

[programs.localnet]
wbth = "wBTH111111111111111111111111111111111111111"

[programs.devnet]
wbth = "wBTH111111111111111111111111111111111111111"

[programs.mainnet]
wbth = "wBTH111111111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# npm-consistent with the rest of the repo (no yarn): `anchor test` runs this
# after building. `npx` resolves the locally-installed ts-mocha binary.
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
